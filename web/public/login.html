<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Core Game Bot — Login</title>
  <meta name="description" content="Login to the Core Game Bot admin dashboard">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-page">
  <!-- Animated Background -->
  <div class="bg-animation">
    <div class="hex-grid" id="hexGrid"></div>
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
    <div class="glow-orb orb-3"></div>
    <div class="particles" id="particles"></div>
  </div>

  <!-- Login Card -->
  <div class="login-container">
    <div class="login-card">
      <!-- Logo Section -->
      <div class="login-logo">
        <div class="logo-icon">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <path d="M24 4L42 14V34L24 44L6 34V14L24 4Z" stroke="url(#grad)" stroke-width="2" fill="rgba(124,58,237,0.1)"/>
            <path d="M24 12L36 18V30L24 36L12 30V18L24 12Z" stroke="url(#grad)" stroke-width="1.5" fill="rgba(124,58,237,0.15)"/>
            <circle cx="24" cy="24" r="6" fill="url(#grad)"/>
            <defs>
              <linearGradient id="grad" x1="6" y1="4" x2="42" y2="44">
                <stop offset="0%" stop-color="#7C3AED"/>
                <stop offset="100%" stop-color="#3B82F6"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h1 class="login-title">CORE <span class="accent">GAME</span></h1>
        <p class="login-subtitle">Admin Dashboard — پانێلی بەڕێوەبردن</p>
      </div>

      <!-- Divider -->
      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">LOGIN</span>
        <div class="divider-line"></div>
      </div>

      <!-- Simple Password Login -->
      <div id="simpleLogin">
        <div class="form-group">
          <label class="form-label">🔑 Admin Password — وشەی نهێنی</label>
          <input type="password" class="form-input" id="adminPassword" placeholder="Enter admin password..."
            style="background: rgba(13,13,28,0.8); text-align: center; font-size: 16px; letter-spacing: 2px;">
        </div>
        <button class="discord-login-btn" onclick="simpleLogin()" id="loginBtn" style="background: linear-gradient(135deg, #7C3AED, #3B82F6);">
          <span>🔓</span>
          <span>Login — چوونەژوورەوە</span>
          <div class="btn-shine"></div>
        </button>
      </div>

      <!-- Discord OAuth2 Login (shown if CLIENT_SECRET is configured) -->
      <div id="discordLogin" style="display: none;">
        <a href="/auth/login" class="discord-login-btn">
          <svg width="24" height="24" viewBox="0 0 71 55" fill="currentColor">
            <path d="M60.1 4.9C55.6 2.8 50.7 1.3 45.7.4c-.1 0-.2 0-.2.1-.6 1.1-1.3 2.6-1.8 3.7-5.5-.8-10.9-.8-16.3 0-.5-1.2-1.2-2.6-1.8-3.7 0-.1-.1-.1-.2-.1C20.3 1.3 15.4 2.8 10.9 4.9c0 0-.1 0-.1.1C1.6 18.7-.9 32.1.3 45.4v.2c6.1 4.5 12 7.2 17.7 9 .1 0 .2 0 .2 0 1.4-1.9 2.6-3.8 3.6-5.9.1-.1 0-.3-.1-.3-2-.7-3.8-1.6-5.6-2.7-.1-.1-.1-.3 0-.3.4-.3.8-.6 1.1-.9.1-.1.1-.1.2-.1 11.6 5.3 24.2 5.3 35.7 0h.2c.4.3.7.6 1.1.9.1.1.1.3 0 .3-1.8 1-3.6 2-5.6 2.7-.1 0-.2.2-.1.3 1.1 2.1 2.3 4 3.6 5.9 0 .1.1.1.2.1 5.8-1.8 11.7-4.5 17.7-9 0 0 .1-.1.1-.2 1.5-15.3-2.5-28.6-10.5-40.4 0-.1-.1-.1-.1-.1zM23.7 37.3c-3.5 0-6.4-3.2-6.4-7.2s2.8-7.2 6.4-7.2c3.6 0 6.4 3.2 6.4 7.2s-2.9 7.2-6.4 7.2zm23.6 0c-3.5 0-6.4-3.2-6.4-7.2s2.8-7.2 6.4-7.2c3.6 0 6.4 3.2 6.4 7.2-.1 4-2.9 7.2-6.4 7.2z"/>
          </svg>
          <span>Login with Discord</span>
          <div class="btn-shine"></div>
        </a>
      </div>

      <!-- Error Message -->
      <div class="error-message" id="errorMsg" style="display: none;">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <path d="M8 0a8 8 0 100 16A8 8 0 008 0zm1 12H7v-2h2v2zm0-3H7V4h2v5z"/>
        </svg>
        <span id="errorText"></span>
      </div>

      <p class="login-info">
        Only authorized administrators can access this panel.<br>
        <span class="kurdish-text">تەنها بەڕێوەبەری دڵنیاکراو دەتوانێت بچێتە ئەم پانێلە.</span>
      </p>
    </div>

    <div class="login-footer">
      <span>Core Game Bot v1.0</span>
      <span class="dot">•</span>
      <span>کۆری گەیم</span>
    </div>
  </div>

  <script>
    // ── Error Handling ─────────────────────────
    const params = new URLSearchParams(window.location.search);
    const error = params.get('error');
    if (error) {
      showError({
        not_admin: 'You must be a server administrator.',
        token_failed: 'Authentication failed. Please try again.',
        server_error: 'Server error. Please try again later.',
      }[error] || 'An error occurred.');
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      document.getElementById('errorText').textContent = msg;
      el.style.display = 'flex';
      setTimeout(() => { el.style.display = 'none'; }, 5000);
    }

    // ── Simple Password Login ──────────────────
    async function simpleLogin() {
      const pw = document.getElementById('adminPassword').value;
      if (!pw) return showError('Please enter a password');

      const btn = document.getElementById('loginBtn');
      btn.innerHTML = '⏳ Logging in...';
      btn.disabled = true;

      try {
        const res = await fetch('/auth/simple-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pw }),
        });

        if (res.ok) {
          window.location.href = '/dashboard';
        } else {
          showError('Wrong password — وشەی نهێنی هەڵەیە');
          btn.innerHTML = '🔓 <span>Login — چوونەژوورەوە</span>';
          btn.disabled = false;
        }
      } catch {
        showError('Connection error');
        btn.innerHTML = '🔓 <span>Login — چوونەژوورەوە</span>';
        btn.disabled = false;
      }
    }

    // Enter key to login
    document.getElementById('adminPassword').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') simpleLogin();
    });

    // ── Hex Grid ───────────────────────────────
    const hexGrid = document.getElementById('hexGrid');
    for (let i = 0; i < 30; i++) {
      const hex = document.createElement('div');
      hex.className = 'hex';
      hex.style.left = `${Math.random() * 100}%`;
      hex.style.top = `${Math.random() * 100}%`;
      hex.style.animationDelay = `${Math.random() * 8}s`;
      hex.style.animationDuration = `${6 + Math.random() * 6}s`;
      hexGrid.appendChild(hex);
    }

    // ── Particles ──────────────────────────────
    const particles = document.getElementById('particles');
    for (let i = 0; i < 40; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = `${Math.random() * 100}%`;
      p.style.top = `${Math.random() * 100}%`;
      p.style.animationDelay = `${Math.random() * 5}s`;
      p.style.animationDuration = `${3 + Math.random() * 4}s`;
      p.style.width = p.style.height = `${1 + Math.random() * 3}px`;
      particles.appendChild(p);
    }
  </script>
</body>
</html>
