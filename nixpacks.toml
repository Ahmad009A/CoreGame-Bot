# nixpacks.toml — Railway build configuration
# No yt-dlp needed — using Invidious API (works from datacenter IPs)
# ffmpeg-static provides bundled ffmpeg binary via npm

[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = ["npm install --legacy-peer-deps"]

[start]
cmd = "node index.js"
