# nixpacks.toml — Railway build configuration

[phases.setup]
nixPkgs = ["nodejs_20", "ffmpeg", "curl"]

[phases.install]
cmds = ["npm install"]

[phases.build]
cmds = [
  "curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o ./node_modules/youtube-dl-exec/bin/yt-dlp 2>/dev/null || true",
  "chmod +x ./node_modules/youtube-dl-exec/bin/yt-dlp 2>/dev/null || true"
]

[start]
cmd = "node index.js"
