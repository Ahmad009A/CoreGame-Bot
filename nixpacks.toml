# nixpacks.toml — Railway build configuration

[phases.setup]
nixPkgs = ["nodejs_22", "ffmpeg-full", "python312", "yt-dlp"]

[phases.install]
cmds = [
  "npm install --ignore-scripts",
  "mkdir -p node_modules/yt-dlp-exec/bin",
  "ln -sf $(which yt-dlp) node_modules/yt-dlp-exec/bin/yt-dlp || cp $(which yt-dlp) node_modules/yt-dlp-exec/bin/yt-dlp || echo 'yt-dlp link failed'"
]

[start]
cmd = "node index.js"
