# nixpacks.toml — Railway build configuration

[variables]
YOUTUBE_DL_SKIP_PYTHON_CHECK = "1"
NODE_ENV = "production"

[phases.setup]
nixPkgs = ["nodejs_22", "ffmpeg", "python3", "curl"]

[phases.install]
cmds = ["npm install"]

[phases.build]
cmds = [
  "curl -fsSL https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o ./node_modules/youtube-dl-exec/bin/yt-dlp || true",
  "chmod +x ./node_modules/youtube-dl-exec/bin/yt-dlp || true"
]

[start]
cmd = "node index.js"
